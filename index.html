<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Engine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div id="debugPanel">
    <h3>Engine Stats</h3>
    <div class="stat-row">Particles  <span id="dbgCount">0</span></div>
    <div class="stat-row">FPS        <span id="dbgFPS">0</span></div>
    <div class="stat-row">Delta      <span id="dbgDelta">0</span> ms</div>
    <div class="stat-row">Pool size  <span id="dbgPool">0</span></div>
    <div class="stat-row">Emitted    <span id="dbgTotal">0</span></div>
    <div class="stat-row">Held       <span id="dbgHeld">no</span></div>
    <div class="stat-row">Angle      <span id="dbgAngle">0°</span></div>
    <div class="stat-row">Physics    <span id="dbgPhysics">none</span></div>
  </div>

  <!-- Keyboard shortcut guide — NEW in Branch 3 -->
  <div id="keysPanel">
    <div class="key-row"><kbd>G</kbd> gravity</div>
    <div class="key-row"><kbd>F</kbd> friction</div>
    <div class="key-row"><kbd>W</kbd> wind</div>
    <div class="key-row"><kbd>S</kbd> spiral</div>
    <div class="key-row"><kbd>A</kbd> flip gravity</div>
  </div>

  <div id="branchLabel">branch: physics-effects</div>

  <div id="instructions">
    Move — trail &nbsp;·&nbsp; Click — burst &nbsp;·&nbsp; Hold — stream
  </div>

  <script src="config.js"></script>
  <script src="engine/Particle.js"></script>
  <script src="engine/ParticlePool.js"></script>
  <script src="engine/Emitter.js"></script>
  <script src="engine/Physics.js"></script>
  <script src="engine/Engine.js"></script>
  <script src="engine/InputHandler.js"></script>
  <script src="main.js"></script>

</body>
</html>
